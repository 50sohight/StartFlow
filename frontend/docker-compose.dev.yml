services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8078}
      PUBLIC_AI_URL: ${PUBLIC_AI_URL:-http://localhost:8077}
    volumes:
      - ./src:/app/src
      - ./static:/app/static
      - ./vite.config.js:/app/vite.config.js
      - ./svelte.config.js:/app/svelte.config.js
