# GPU overlay: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d --build
services:
  ai-model:
    build:
      dockerfile: Dockerfile.cuda
      args:
        CUDA_WHEEL_TAG: ${CUDA_WHEEL_TAG:-cu124}
    environment:
      # -1 = offload all layers; capped by model size (~35 for 8B). Not the same as N_CTX=2048.
      N_GPU_LAYERS: "${N_GPU_LAYERS:--1}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
