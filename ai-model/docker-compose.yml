services:
  ai-model:
    container_name: startflow-ai-model
    build:
      context: .
      dockerfile: Dockerfile
    image: startflow-ai-model:latest
    ports:
      - "8075:8069"
    environment:
      MODEL_DIR: /service/models
      MODEL_FILENAME: ${MODEL_FILENAME:-vikhr-llama3.1-8b-instruct-r-21-09-24-q4_k_m.gguf}
      N_GPU_LAYERS: "0"
      N_CTX: "2048"
      HF_MODEL_URL: ${HF_MODEL_URL:-https://huggingface.co/Neurogen/Vikhr-Llama3.1-8B-Instruct-R-21-09-24-Q4_K_M-GGUF}
    volumes:
      # Store the large GGUF outside the repository and mount it here.
      # Example (Windows): MODEL_HOST_PATH=D:/AI/models/vikhr
      - ${MODEL_HOST_PATH:?Set MODEL_HOST_PATH to a host folder with GGUF}:/service/models:ro
    restart: unless-stopped
